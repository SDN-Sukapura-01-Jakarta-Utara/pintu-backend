version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - GIN_MODE=release
      - PORT=3000
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-pintu_db}
      - DB_SSLMODE=disable
    networks:
      - pintu-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "3010:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - pintu-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3011:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin01
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - pintu-network
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  pintu-network:
    driver: bridge

# Note: PostgreSQL database runs on local machine or external server
# To connect from Docker container to local PostgreSQL:
# - Use DB_HOST=host.docker.internal (Windows/Mac)
# - Use DB_HOST=172.17.0.1 (Linux)
